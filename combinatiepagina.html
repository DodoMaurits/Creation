<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creation</title>
  <link rel="stylesheet" href="game.css" />
</head>
  
<body>
  <div id="timeline">
    <div id="timeline-fill"></div>
    <div id="timeline-label">13.8 miljard jaar geleden</div>
  </div>
  
  <div id="app">
    <div id="closed-container" class="center"></div>
    <div id="left-side" class="side hidden"></div>
    <div id="right-side" class="side hidden"></div>
  </div>

  <div id="hint-container">
    <div id="hint-bubble"></div>
    <div id="hint-button">?</div>
  </div>

  <div id="audio-controls">
    <div id="mute-button"></div>
    <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.4">
  </div>
  
  <audio id="backgroundmusic" src="music.mp3" loop autoplay></audio>

  <script src="game.js"></script>
  <script>
    const music = document.getElementById("backgroundmusic");
    const muteButton = document.getElementById("mute-button");
    const volumeSlider = document.getElementById("volume-slider");
    
    music.volume = volumeSlider.value;
    music.play().catch(() => console.log("Autoplay geblokkeerd, start na eerste klik"));
    document.addEventListener("click", () => music.play(), { once: true });
    
    let muted = false;
    let lastVolume = music.volume;
    
    function updateMuteIcon() {
      if (muted) {
        muteButton.innerHTML = `
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M3 10v4h4l5 5V5l-5 5H3z"/>
            <line x1="19" y1="5" x2="5" y2="19" stroke="#555" stroke-width="2"/>
          </svg>`;
      } else {
        muteButton.innerHTML = `
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M3 10v4h4l5 5V5l-5 5H3z"/>
            <path d="M14.5 12c0-1 0.5-1.9 1.3-2.5m0 5c-0.8-0.6-1.3-1.5-1.3-2.5" stroke="#555" stroke-width="2" fill="none"/>
          </svg>`;
      }
    }
    volumeSlider.addEventListener("input", () => {
      music.volume = volumeSlider.value;
      lastVolume = volumeSlider.value;
    });
    
    updateMuteIcon();
    muteButton.addEventListener("click", (e) => {
      e.stopPropagation();
      muted = !muted;
      music.muted = muted;
      if (muted) {
        // Zet slider op 0 bij mute
        volumeSlider.value = 0;
      } else {
        // Zet slider terug naar laatste volume bij unmute
        volumeSlider.value = lastVolume;
        music.volume = lastVolume;
      }
      updateMuteIcon();
    });
  </script>
  
</body>
</html>
