<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creation</title>
  <link rel="stylesheet" href="game.css" />
</head>
  
<body>
  <div id="app">
    <div id="closed-container" class="center"></div>
    <div id="left-side" class="side hidden"></div>
    <div id="right-side" class="side hidden"></div>
  </div>
  
  <div id="timeline">
    <div id="timeline-fill"></div>
    <div id="timeline-label">13.8 miljard jaar geleden</div>
  </div>

  <audio id="backgroundmusic" src="music.mp3" loop autoplay></audio>
  
  <script src="game.js"></script>
  <script>
    const music = document.getElementById("backgroundmusic"); // kleine m
    music.volume = 0.4;
    music.play().catch(() => {
      console.log("Autoplay geblokkeerd, start na eerste klik");
    });
    
    document.addEventListener("click", () => {
      music.play();
    }, { once: true });
  </script>
  
</body>
</html>
